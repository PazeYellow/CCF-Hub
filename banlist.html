<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Banlist System</title>

<style>
  :root {
    --bg: #0f1220;
    --panel: #171a2b;
    --panel2: #1f2440;
    --text: #e8ecff;
    --muted: #aab2d5;

    --banned: #ff4d4d;
    --limited: #ffb84d;
    --semi: #4da3ff;
  }

  body.light {
    --bg: #f5f7ff;
    --panel: #ffffff;
    --panel2: #eef1ff;
    --text: #1c1f2e;
    --muted: #5a607a;
  }

  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: var(--bg);
    color: var(--text);
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    align-items: center;
  }

  h1 {
    font-size: 16px;
    margin: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  input {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: var(--panel2);
    color: var(--text);
  }

  button {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: var(--panel2);
    color: var(--text);
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    padding: 16px;
  }

  .card {
    background: var(--panel);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: #000;
  }

  .info {
    padding: 8px;
  }

  .name {
    font-size: 13px;
    font-weight: 600;
  }

  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 6px;
    display: inline-block;
    margin-top: 4px;
    color: white;
  }

  .banned { background: var(--banned); }
  .limited { background: var(--limited); }
  .semi { background: var(--semi); }

  @media (max-width: 600px) {
    .card img { height: 140px; }
  }
</style>
</head>

<body>

<header>
  <h1>🔴 Banlist System</h1>

  <div class="controls">
    <input id="search" placeholder="Search cards..." oninput="render()" />
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>

/* =========================
   CONFIG
========================= */

// 🔴 JSONBin (PUT YOUR KEY HERE)
const JSONBIN_ID = "69eda6feaaba8821973af658";
const JSONBIN_KEY = "$2a$10$/0lb7pV0l3jDCYlUboTzhu9SoEPI/sxZJV2lNFm881.2nQPZqvkj2  "; // <-- put it here

/* ========================= */

let banlist = [];

/* THEME */
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

(function loadTheme(){
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
})();

/* FETCH BANLIST */
async function loadData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: {
        "X-Access-Key": JSONBIN_KEY
      }
    });

    const data = await res.json();
    banlist = data.record.banlist || [];
    render();
  } catch (err) {
    console.error("JSONBin error:", err);
  }
}

/* YGOPRODECK FETCH */
async function getYGOPic(name) {
  try {
    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(name)}`);
    const data = await res.json();
    return data.data?.[0]?.card_images?.[0]?.image_url || null;
  } catch {
    return null;
  }
}

/* RENDER */
async function render() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  for (const card of banlist) {

    if (search && !card.name.toLowerCase().includes(search)) continue;

    let img = card.customImage || await getYGOPic(card.name);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img || ''}" onerror="this.style.display='none'"/>
      <div class="info">
        <div class="name">${card.name}</div>
        <div class="tag ${card.status}">${card.status.toUpperCase()}</div>
      </div>
    `;

    grid.appendChild(div);
  }
}

/* INIT */
loadData();

</script>

</body>
</html>
