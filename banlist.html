<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Banlist</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="stylesheet" href="styles.css?v=12" />
  <script src="site.js" defer></script>
  <script src="api-config.js?v=13" defer></script>
  <script src="banlist-viewer.js?v=3" defer></script>
</head>
<body data-page="banlist">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="index.html" aria-label="CCF home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>CCF<small>Custom Card Format</small></span>
      </a>

      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" data-nav="home" href="index.html">Home</a>
        <a class="nav-link" data-nav="database" href="database.html">Database</a>
        <a class="nav-link" data-nav="banlist" href="banlist.html">Banlist</a>
        <a class="nav-link" data-nav="calendar" href="calendar.html">Calendar</a>
        <a class="nav-link" data-nav="editor" href="banlist-editor.html">Admin</a>
        <a class="button discord" href="https://discord.gg/arWVaBH9U5" target="_blank" rel="noreferrer">Discord</a>
        <button type="button" data-theme-toggle onclick="toggleTheme()">Light</button>
      </nav>
    </div>
  </header>

  <main class="site-shell">
    <section class="page-intro" aria-labelledby="pageTitle">
      <div>
        <p class="page-kicker">Format Rules</p>
        <h1 id="pageTitle">CCF Banlist</h1>
        <p class="lead">Live format restrictions grouped by forbidden, limited, and semi-limited status.</p>
      </div>
      <a class="button primary" href="database.html">Search Cards</a>
    </section>

    <section class="tool-surface" aria-label="Banlist controls">
      <div class="toolbar banlist-toolbar">
        <label class="field">
          <span>Search</span>
          <input id="search" class="search-input" type="search" placeholder="Search banlist cards..." autocomplete="off" />
        </label>

        <div class="status-tabs" role="tablist" aria-label="Banlist status">
          <button class="status-tab active" type="button" data-status="forbidden">Forbidden <span id="count-forbidden">0</span></button>
          <button class="status-tab" type="button" data-status="limited">Limited <span id="count-limited">0</span></button>
          <button class="status-tab" type="button" data-status="semi_limited">Semi <span id="count-semi_limited">0</span></button>
        </div>
      </div>
    </section>

    <div id="loader" class="load-state">Loading banlist data...</div>

    <section class="database-results" aria-label="Banlist results">
      <div class="result-meta">
        <span id="banlistStatus">Live banlist database</span>
        <strong id="visibleCount">0 cards</strong>
      </div>
      <div id="banlist-content" class="ban-card-grid"></div>
    </section>
  </main>

  <script>
    let banlistData = { forbidden: [], limited: [], semi_limited: [] };
    let currentTab = "forbidden";
    const DEFAULT_API_BASE_URL = "https://ccf-hub.theyellowlightsader.workers.dev";

    function apiUrl(path) {
      const base = (window.CCF_API_CONFIG && window.CCF_API_CONFIG.apiBaseUrl || DEFAULT_API_BASE_URL).replace(/\/+$/, "");
      return `${base}${path}`;
    }

    function normaliseCard(card) {
      return {
        name: String(card.name || "Unnamed Card"),
        type: String(card.type || "Card"),
        image: String(card.image || card.imageUrl || "")
      };
    }

    async function fetchBanlist() {
      const loader = document.getElementById("loader");
      try {
        const response = await fetch(apiUrl("/api/banlist"), {
          headers: { "Accept": "application/json" }
        });
        if (!response.ok) throw new Error(`Cloudflare API returned ${response.status}`);

        const record = await response.json();
        banlistData = {
          forbidden: Array.isArray(record.forbidden) ? record.forbidden.map(normaliseCard) : [],
          limited: Array.isArray(record.limited) ? record.limited.map(normaliseCard) : [],
          semi_limited: Array.isArray(record.semi_limited) ? record.semi_limited.map(normaliseCard) : []
        };

        loader.style.display = "none";
        updateCounts();
        renderGrid();
      } catch (error) {
        loader.className = "notice danger";
        loader.textContent = `Failed to load banlist data: ${error.message}`;
      }
    }

    function updateCounts() {
      document.getElementById("count-forbidden").textContent = banlistData.forbidden.length;
      document.getElementById("count-limited").textContent = banlistData.limited.length;
      document.getElementById("count-semi_limited").textContent = banlistData.semi_limited.length;
    }

    function statusLabel(status) {
      if (status === "forbidden") return "Forbidden";
      if (status === "limited") return "Limited";
      return "Semi-Limited";
    }

    function buildImage(card, container) {
      container.classList.toggle("missing", !card.image);
      container.innerHTML = "";
      if (!card.image) return;

      const img = document.createElement("img");
      img.src = card.image;
      img.alt = card.name;
      img.loading = "lazy";
      img.onerror = function () {
        container.classList.add("missing");
        img.remove();
      };
      container.appendChild(img);
    }

    function renderGrid() {
      const container = document.getElementById("banlist-content");
      const searchQuery = document.getElementById("search").value.trim().toLowerCase();
      const activeCards = banlistData[currentTab] || [];
      const filteredCards = activeCards.filter((card) => card.name.toLowerCase().includes(searchQuery));

      container.innerHTML = "";
      document.getElementById("visibleCount").textContent = `${filteredCards.length} of ${activeCards.length} cards`;
      document.getElementById("banlistStatus").textContent = statusLabel(currentTab);

      if (filteredCards.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No cards found in this section.";
        container.appendChild(empty);
        return;
      }

      filteredCards.forEach((card) => {
        const item = document.createElement("article");
        item.className = "ban-card";

        const art = document.createElement("div");
        art.className = "card-art";
        buildImage(card, art);

        const body = document.createElement("div");
        body.className = "card-body";

        const badge = document.createElement("span");
        badge.className = `ban-badge ${currentTab}`;
        badge.textContent = statusLabel(currentTab);

        const name = document.createElement("div");
        name.className = "card-name";
        name.textContent = card.name;

        const type = document.createElement("div");
        type.className = "card-text";
        type.textContent = card.type;

        body.append(badge, name, type);
        item.append(art, body);
        container.appendChild(item);
      });
    }

    document.querySelectorAll(".status-tab").forEach((button) => {
      button.addEventListener("click", function () {
        document.querySelectorAll(".status-tab").forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentTab = button.getAttribute("data-status");
        renderGrid();
      });
    });

    document.getElementById("search").addEventListener("input", renderGrid);
    fetchBanlist();
  </script>
</body>
</html>
