<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Yu-Gi-Oh! Banlist</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-color: #1a1d24;
            --text-color: #f5f6f7;
            --text-muted: #8a96a3;
            
            /* Status Colors */
            --forbidden-color: #ff3344;
            --limited-color: #ff9900;
            --semi-color: #3388ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(180deg, #161920 0%, var(--bg-color) 100%);
            border-bottom: 2px solid #222733;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffe066, #f5f6f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Controls: Search and Tabs */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #333b4d;
            background-color: var(--panel-color);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: #ffe066;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--panel-color);
            padding: 0.4rem;
            border-radius: 8px;
            border: 1px solid #222733;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            color: var(--text-color);
        }

        .tab-btn.active[data-status="forbidden"] { background: var(--forbidden-color); color: white; }
        .tab-btn.active[data-status="limited"] { background: var(--limited-color); color: white; }
        .tab-btn.active[data-status="semi_limited"] { background: var(--semi-color); color: white; }

        /* Card Grid Layout */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            justify-content: center;
        }

        .card-item {
            background-color: var(--panel-color);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222733;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 146%; /* Yu-Gi-Oh card aspect ratio standard */
            background-color: #111318;
        }

        .card-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 0.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 0.4rem;
        }

        .card-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        .card-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status Indicators on Cards */
        .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: white;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .forbidden-badge { background-color: var(--forbidden-color); }
        .limited-badge { background-color: var(--limited-color); }
        .semi-badge { background-color: var(--semi-color); }

        /* Loader */
        .loader {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 5rem;
        }

        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }
            .card-name { font-size: 0.85rem; }
            .tab-btn { padding: 0.5rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Custom Banlist Hub</h1>
        <p style="color: var(--text-muted); margin: 0;">Live Updating Format Regulations</p>
    </header>

    <div class="container">
        <div class="controls">
            <input type="text" id="search" class="search-box" placeholder="Search cards...">
            
            <div class="tabs">
                <button class="tab-btn active" data-status="forbidden">Forbidden (<span id="count-forbidden">0</span>)</button>
                <button class="tab-btn" data-status="limited">Limited (<span id="count-limited">0</span>)</button>
                <button class="tab-btn" data-status="semi_limited">Semi-Limited (<span id="count-semi_limited">0</span>)</button>
            </div>
        </div>

        <div id="loader" class="loader">Loading official database restrictions...</div>
        <div id="banlist-content" class="card-grid" style="display: none;"></div>
    </div>

    <script>
        // CONFIGURATION: Replace these with your actual jsonbin.io settings
        const BIN_ID = '69eda6feaaba8821973af658'; 
        const READ_ONLY_KEY = '$2a$10$eVCBs2gFb.tryboPhC1.o.h./sTrxQkfjW7Wd.JI00IimnkA47zHa';
        
        let banlistData = { forbidden: [], limited: [], semi_limited: [] };
        let currentTab = 'forbidden';

        async function fetchBanlist() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': READ_ONLY_KEY
                    }
                });
                if (!response.ok) throw new Error('Network response failed');
                const resData = await response.json();
                
                // jsonbin wraps your raw object inside a "record" field
                banlistData = resData.record;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('banlist-content').style.display = 'grid';
                
                updateCounts();
                renderGrid();
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loader').innerText = 'Failed to load banlist data. Check configuration keys.';
            }
        }

        function updateCounts() {
            document.getElementById('count-forbidden').innerText = banlistData.forbidden?.length || 0;
            document.getElementById('count-limited').innerText = banlistData.limited?.length || 0;
            document.getElementById('count-semi_limited').innerText = banlistData.semi_limited?.length || 0;
        }

        function getStatusBadge(status) {
            if (status === 'forbidden') return '<div class="status-badge forbidden-badge">0</div>';
            if (status === 'limited') return '<div class="status-badge limited-badge">1</div>';
            return '<div class="status-badge semi-badge">2</div>';
        }

        function renderGrid() {
            const container = document.getElementById('banlist-content');
            const searchQuery = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';

            const activeCards = banlistData[currentTab] || [];
            
            const filteredCards = activeCards.filter(card => 
                card.name.toLowerCase().includes(searchQuery)
            );

            if (filteredCards.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 3rem 0;">No cards found matching that description.</div>`;
                return;
            }

            filteredCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-item';
                cardEl.innerHTML = `
                    ${getStatusBadge(currentTab)}
                    <div class="image-wrapper">
                        <img class="card-img" src="${card.image}" alt="${card.name}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <p class="card-name">${card.name}</p>
                        <span class="card-type">${card.type || 'Card'}</span>
                    </div>
                `;
                container.appendChild(cardEl);
            });
        }

        // Tab Event Listeners
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentTab = button.getAttribute('data-status');
                renderGrid();
            });
        });

        // Search Event Listener
        document.getElementById('search').addEventListener('input', renderGrid);

        // Initial Initialization
        fetchBanlist();
    </script>
</body>
</html>
