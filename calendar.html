<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Calendar</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="stylesheet" href="styles.css?v=13" />
  <script src="site.js" defer></script>
</head>
<body data-page="calendar">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="index.html" aria-label="CCF home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>CCF<small>Custom Card Format</small></span>
      </a>

      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" data-nav="home" href="index.html">Home</a>
        <a class="nav-link" data-nav="database" href="database.html">Database</a>
        <a class="nav-link" data-nav="banlist" href="banlist.html">Banlist</a>
        <a class="nav-link" data-nav="calendar" href="calendar.html">Calendar</a>
        <a class="nav-link" data-nav="editor" href="banlist-editor.html">Admin</a>
        <a class="button discord" href="https://discord.gg/arWVaBH9U5" target="_blank" rel="noreferrer">Discord</a>
        <button type="button" data-theme-toggle onclick="toggleTheme()">Light</button>
      </nav>
    </div>
  </header>

  <main class="site-shell">
    <section class="page-intro" aria-labelledby="pageTitle">
      <div>
        <p class="page-kicker">Schedule</p>
        <h1 id="pageTitle">CCF Calendar</h1>
        <p class="lead">Release days, banlist checks, and weekly tournament markers in one place.</p>
      </div>
      <a class="button primary" href="database.html">Search Cards</a>
    </section>

    <section class="tool-surface editor-panel" aria-label="Calendar">
      <div class="calendar-header">
        <h2 id="monthLabel" class="month-label"></h2>
        <div class="calendar-controls">
          <button type="button" onclick="changeMonth(-1)" aria-label="Previous month">&lt;</button>
          <button type="button" onclick="goToToday()">Today</button>
          <button type="button" onclick="changeMonth(1)" aria-label="Next month">&gt;</button>
        </div>
      </div>

      <div class="calendar-grid" id="calendar"></div>
    </section>
  </main>

  <script>
    let current = new Date();
    const releaseStart = new Date(2026, 5, 12);

    function startOfDay(date) {
      const copy = new Date(date);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function isReleaseDay(date) {
      const msPerDay = 1000 * 60 * 60 * 24;
      const diff = Math.floor((startOfDay(date) - startOfDay(releaseStart)) / msPerDay);
      return diff >= 0 && diff % 14 === 0;
    }

    function isBanlist(date) {
      const y = date.getFullYear();
      const m = date.getMonth();
      const d = date.getDate();
      if (y === 2026 && m === 5 && d === 12) return false;
      return d === 12 || d === 24;
    }

    function isTournament(date) {
      return date.getDay() === 6;
    }

    function addEvent(cell, label, className) {
      const event = document.createElement("span");
      event.className = `event-badge ${className}`;
      event.textContent = label;
      cell.appendChild(event);
    }

    function renderCalendar() {
      const calendar = document.getElementById("calendar");
      calendar.innerHTML = "";

      const year = current.getFullYear();
      const month = current.getMonth();
      document.getElementById("monthLabel").textContent = current.toLocaleString("default", {
        month: "long",
        year: "numeric"
      });

      ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach((day) => {
        const el = document.createElement("div");
        el.className = "day-name";
        el.textContent = day;
        calendar.appendChild(el);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const days = new Date(year, month + 1, 0).getDate();
      const today = startOfDay(new Date()).toDateString();

      for (let i = 0; i < firstDay; i += 1) {
        const empty = document.createElement("div");
        empty.className = "calendar-day empty";
        calendar.appendChild(empty);
      }

      for (let day = 1; day <= days; day += 1) {
        const date = new Date(year, month, day);
        const cell = document.createElement("div");
        cell.className = "calendar-day";

        if (startOfDay(date).toDateString() === today) {
          cell.classList.add("today");
        }

        const number = document.createElement("div");
        number.className = "date-number";
        number.textContent = day;
        cell.appendChild(number);

        if (isBanlist(date)) addEvent(cell, "Banlist", "banlist");
        if (isReleaseDay(date)) addEvent(cell, "Card Release", "release");
        if (isTournament(date)) addEvent(cell, "Tournament", "tourney");

        calendar.appendChild(cell);
      }
    }

    function changeMonth(step) {
      current.setMonth(current.getMonth() + step);
      renderCalendar();
    }

    function goToToday() {
      current = new Date();
      renderCalendar();
    }

    renderCalendar();
  </script>
</body>
</html>
