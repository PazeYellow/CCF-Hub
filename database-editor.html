<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Database Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="site.js" defer></script>
  <script src="api-config.js" defer></script>
  <script src="api-client.js" defer></script>
  <script src="database-editor.js" defer></script>
</head>
<body data-page="editor">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="index.html" aria-label="CCF home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>CCF<small>Custom Card Format</small></span>
      </a>

      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-link" data-nav="home" href="index.html">Home</a>
        <a class="nav-link" data-nav="database" href="database.html">Database</a>
        <a class="nav-link" data-nav="banlist" href="banlist.html">Banlist</a>
        <a class="nav-link" data-nav="calendar" href="calendar.html">Calendar</a>
        <a class="nav-link" data-nav="editor" href="banlist-editor.html">Admin</a>
        <button type="button" data-theme-toggle onclick="toggleTheme()">Light</button>
      </nav>
    </div>
  </header>

  <main class="site-shell">
    <section class="page-intro" aria-labelledby="pageTitle">
      <div>
        <p class="page-kicker">Owner Tool</p>
        <h1 id="pageTitle">Database Editor</h1>
        <p class="lead">Edit the custom card database stored in Cloudflare.</p>
      </div>
      <a class="button" href="banlist-editor.html">Banlist Admin</a>
    </section>

    <section id="authPanel" class="tool-surface editor-panel">
      <h2>Log In</h2>
      <div class="form-grid">
        <label class="field">
          <span>Email</span>
          <input id="loginEmail" type="email" autocomplete="email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="loginPassword" type="password" autocomplete="current-password" />
        </label>
      </div>
      <div class="action-row">
        <button id="loginButton" class="primary" type="button">Log In</button>
      </div>
      <div id="authMessage" class="notice hidden"></div>
    </section>

    <section id="editorWorkspace" class="hidden">
      <div class="tool-surface editor-panel admin-session">
        <strong id="sessionMeta">Logged in</strong>
        <div class="action-row">
          <button id="syncDatabase" type="button">Sync</button>
          <button id="logoutButton" type="button">Log Out</button>
        </div>
      </div>

      <div class="editor-layout">
        <aside class="tool-surface editor-panel sticky">
          <label class="field">
            <span>Search</span>
            <input id="cardSearch" type="search" autocomplete="off" />
          </label>
          <div id="cardList" class="editor-list"></div>
        </aside>

        <section class="tool-surface editor-panel">
          <div class="result-meta">
            <span id="editorStatus">No card selected</span>
            <strong id="cardCount">0 cards</strong>
          </div>
          <div class="form-grid">
            <label class="field">
              <span>Card Name</span>
              <input id="name" type="text" />
            </label>
            <label class="field">
              <span>Type</span>
              <input id="type" type="text" />
            </label>
            <label class="field">
              <span>Attribute</span>
              <input id="attribute" type="text" />
            </label>
            <label class="field">
              <span>Race/Subtype</span>
              <input id="race" type="text" />
            </label>
            <label class="field">
              <span>Level/Rank</span>
              <input id="level" type="text" />
            </label>
            <label class="field">
              <span>Status</span>
              <input id="statusField" type="text" />
            </label>
            <label class="field">
              <span>ATK</span>
              <input id="atk" type="text" />
            </label>
            <label class="field">
              <span>DEF</span>
              <input id="def" type="text" />
            </label>
            <label class="field span-2">
              <span>Image URL</span>
              <input id="image" type="url" />
            </label>
            <label class="field span-2">
              <span>Tags</span>
              <input id="tags" type="text" />
            </label>
            <label class="field span-2">
              <span>Effect Text</span>
              <textarea id="text"></textarea>
            </label>
          </div>
          <div class="action-row">
            <button id="newCard" type="button">New</button>
            <button id="saveLocal" type="button">Save Draft</button>
            <button id="saveLive" class="primary" type="button">Save to Cloudflare</button>
            <button id="deleteCard" type="button">Delete</button>
          </div>
          <div id="editorMessage" class="notice hidden"></div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
