<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yu-Gi-Oh Server Hub</title>

<style>
:root {
  --bg: #0f1220;
  --panel: rgba(20, 23, 40, 0.72);
  --text: #e8ecff;
  --muted: #aab2d5;
  --accent: #8b5cf6;
}

body.light {
  --bg: #f5f7ff;
  --panel: rgba(255, 255, 255, 0.85);
  --text: #1c1f2e;
  --muted: #5a607a;
}

body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1f3a, var(--bg));
  color: var(--text);
  overflow-x: hidden;
}

/* glow background */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 450px;
  height: 450px;
  background: var(--accent);
  filter: blur(130px);
  opacity: 0.12;
  z-index: 0;
}

body::before { top: -120px; left: -120px; }
body::after { bottom: -160px; right: -140px; }

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--panel);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

h1 {
  font-size: 15px;
  margin: 0;
  letter-spacing: 0.6px;
}

/* BUTTON */
button {
  background: transparent;
  border: 1px solid var(--muted);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  border-color: var(--accent);
}

/* LAYOUT */
.container {
  position: relative;
  z-index: 2;
  max-width: 1000px;
  margin: 0 auto;
  padding: 18px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

/* DESKTOP */
@media (min-width: 800px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

/* CARD */
.card {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 16px;
  backdrop-filter: blur(12px);
  transition: transform 0.2s ease, border-color 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  border-color: rgba(139, 92, 246, 0.4);
}

.card h2 {
  font-size: 14px;
  margin: 0 0 6px 0;
  color: var(--muted);
}

.card p {
  margin: 0 0 12px 0;
  font-size: 13px;
  color: var(--text);
  opacity: 0.9;
}

/* LINKS AS BUTTONS (better UX) */
.card a {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(139, 92, 246, 0.15);
  border: 1px solid rgba(139, 92, 246, 0.4);
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  transition: 0.2s;
}

.card a:hover {
  background: rgba(139, 92, 246, 0.25);
  transform: scale(1.03);
}

/* FLOATING CARDS */
.floating-card {
  position: fixed;
  width: 110px;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.45);
  cursor: pointer;
  opacity: 0.85;
  z-index: 1;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.left { left: 10px; top: 120px; }
.right { right: 10px; top: 120px; }

.float {
  animation: floaty 6s ease-in-out infinite;
}

@keyframes floaty {
  0%   { transform: translateY(0px) rotate(var(--r)); }
  50%  { transform: translateY(-10px) rotate(calc(var(--r) + 2deg)); }
  100% { transform: translateY(0px) rotate(var(--r)); }
}

/* MOBILE FIX */
@media (max-width: 600px) {
  .floating-card {
    display: none;
  }
}
</style>
</head>

<body>

<header>
  <h1>Yu-Gi-Oh Server Hub</h1>
  <button onclick="toggleTheme()">🌗</button>
</header>

<!-- FLOATING CARDS -->
<img class="floating-card left float" id="cardLeft" />
<img class="floating-card right float" id="cardRight" />

<div class="container">

  <div class="grid">

    <div class="card">
      <h2>📅 Navigation</h2>
      <p>Access all hub tools and pages.</p>
      <a href="calendar.html">Open Calendar →</a>
    </div>

    <div class="card">
      <h2>🔴 Format Info</h2>
      <p>Check banlists and deck legality updates.</p>
      <a href="banlist.html">Open Banlist →</a>
    </div>

  </div>

</div>

<script>
const images = [
  "images/card1.jpg",
  "images/card2.jpg",
  "images/card3.jpg",
  "images/card4.jpg",
  "images/card5.jpg"
];

let last = null;

function randomCard() {
  let next;
  do {
    next = images[Math.floor(Math.random() * images.length)];
  } while (next === last);

  last = next;
  return next;
}

function setCard(el) {
  el.style.opacity = "0";
  setTimeout(() => {
    el.src = randomCard();
    el.style.opacity = "0.9";
  }, 250);
}

function init() {
  const left = document.getElementById("cardLeft");
  const right = document.getElementById("cardRight");

  left.src = randomCard();
  right.src = randomCard();

  left.style.setProperty("--r", "-6deg");
  right.style.setProperty("--r", "6deg");

  left.onclick = () => setCard(left);
  right.onclick = () => setCard(right);
}

function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem(
    "theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

(function loadTheme(){
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
})();

init();
</script>

</body>
</html>
