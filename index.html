<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yu-Gi-Oh Server Hub</title>

<!-- ✅ FAVICON (replace with your own file if needed) -->
<link rel="icon" type="image/png" href="images/server-icon.png" />

<style>
:root {
  --bg: #0b0d19;
  --bg-gradient: radial-gradient(circle at top, #1a1f3a, #0b0d19);
  --panel: rgba(20, 23, 40, 0.65);
  --panel-border: rgba(255, 255, 255, 0.08);
  --text: #e8ecff;
  --muted: #aab2d5;
  --accent: #8b5cf6;
  --accent-glow: rgba(139, 92, 246, 0.12);
  --discord: #5865F2;
}

body.light {
  --bg: #f4f6fa;
  --bg-gradient: radial-gradient(circle at top, #e3e8f8, #f4f6fa);
  --panel: rgba(255, 255, 255, 0.75);
  --panel-border: rgba(0, 0, 0, 0.06);
  --text: #1a1d29;
  --muted: #5c6484;
  --accent: #6d28d9;
  --accent-glow: rgba(109, 40, 217, 0.06);
}

body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text);
  overflow-x: hidden;
}

/* Header */
header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  background: var(--panel);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--panel-border);
}

.container {
  max-width: 850px;
  margin: 40px auto;
  padding: 0 24px;
  position: relative;
  z-index: 2;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 650px) {
  .grid { grid-template-columns: 1fr 1fr; }
  .grid-full { grid-column: span 2; }
}

/* Cards */
.card {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 24px;
  backdrop-filter: blur(12px);
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 10px 30px var(--accent-glow);
}

.card h2 {
  margin: 0 0 10px;
}

.card p {
  color: var(--muted);
}

/* Floating Cards (FIXED) */
.floating-card {
  position: fixed;
  width: 120px;
  height: 175px;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  cursor: pointer;
  z-index: 5;
  opacity: 0.9;
  transition: transform 0.2s, opacity 0.3s;
}

.floating-card:hover {
  transform: scale(1.08) !important;
  z-index: 6;
}

/* Desktop placement */
@media (min-width: 1100px) {
  .left { left: 20px; top: 180px; }
  .right { right: 20px; top: 180px; }
}

/* Mobile placement (IMPORTANT FIX) */
@media (max-width: 1099px) {
  .floating-card {
    width: 80px;
    height: 120px;
    top: auto;
    bottom: 20px;
    opacity: 0.7;
  }

  .left { left: 10px; }
  .right { right: 10px; }
}

/* Float animation */
.float {
  animation: floaty 6s ease-in-out infinite;
}

@keyframes floaty {
  0% { transform: translateY(0px) rotate(var(--r)); }
  50% { transform: translateY(-12px) rotate(calc(var(--r) + 1.5deg)); }
  100% { transform: translateY(0px) rotate(var(--r)); }
}

/* Buttons */
button {
  background: transparent;
  border: 1px solid var(--panel-border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>Yu-Gi-Oh Server Hub</h1>

  <div>
    <a href="https://discord.gg/arWVaBH9U5" class="btn-discord">Discord</a>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<!-- Floating Cards -->
<img id="cardLeft" class="floating-card left float" />
<img id="cardRight" class="floating-card right float" />

<div class="container">
  <div class="grid">

    <div class="card">
      <h2>📅 Calendar</h2>
      <p>Events and tournaments.</p>
    </div>

    <div class="card">
      <h2>🔴 Banlist</h2>
      <p>Format rules and updates.</p>
    </div>

  </div>
</div>

<script>
const IMAGES = [
  "1.jpg","2.jpg","3.png","4.png","5.png",
  "6.png","7.png","8.png","9.jpg","10.jpg","11.jpg"
];

function randomImg() {
  return "images/" + IMAGES[Math.floor(Math.random() * IMAGES.length)];
}

/* ✅ SIMPLE RELIABLE LOADER */
function setImage(el) {
  const src = randomImg();
  el.onerror = () => {
    console.warn("Image failed:", src);
  };
  el.src = src;
}

function init() {
  const left = document.getElementById("cardLeft");
  const right = document.getElementById("cardRight");

  left.style.setProperty("--r", "-5deg");
  right.style.setProperty("--r", "5deg");

  setImage(left);
  setImage(right);

  left.onclick = () => setImage(left);
  right.onclick = () => setImage(right);
}

/* Theme */
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
